name: Reference Still Verification

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'resources/**'
      - '.github/workflows/reference-still.yml'

jobs:
  reference-still:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install minimal render dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow numpy

      - name: Render and score reference still
        run: python scripts\verify_reference_still.py

      - name: Upload reference still artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ttg-reference-still
          path: |
            outputs\ttg_reference_still.jpg
            outputs\ttg_reference_still_score.json
