name: Reference Animated Preview

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'resources/**'
      - '.github/workflows/reference-preview.yml'

jobs:
  reference-preview:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install minimal render dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow numpy

      - name: Structural self-check
        run: python scripts\self_check_visual_pipeline.py

      - name: Generate visual proof package
        run: python scripts\generate_visual_proof_package.py

      - name: Write failure report if needed
        if: failure()
        run: python scripts\write_failure_report.py

      - name: Write workflow summary
        if: always()
        run: python scripts\write_workflow_summary.py

      - name: Upload animated preview package
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ttg-reference-animated-preview
          path: |
            outputs\index.html
            outputs\FAILURE_REPORT.md
            outputs\VISUAL_PROOF_REVIEW.md
            outputs\ADVANCED_PRESET_REPORT.md
            outputs\ttg_reference_still.jpg
            outputs\ttg_reference_still_score.json
            outputs\reference_motion_preview.gif
            outputs\reference_motion_contact_sheet.jpg
            outputs\reference_motion_score.json
            outputs\ttg_visual_proof_manifest.json
