name: Reference Animated Preview

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'docs/**'
      - 'packs/**'
      - 'resources/**'
      - '.github/workflows/reference-preview.yml'

jobs:
  reference-preview:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install minimal render dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow numpy PyQt6

      - name: Structural self-check
        run: python scripts\self_check_visual_pipeline.py

      - name: Review compile gate
        run: python scripts\review_compile_gate.py

      - name: Building standard report
        run: python scripts\building_standard_report.py

      - name: Product direction report
        run: python scripts\product_direction_report.py

      - name: Property schema check
        run: python scripts\check_property_schema.py

      - name: Asset package self-test
        run: python scripts\self_test_asset_package.py

      - name: Ad project workflow self-test
        run: python scripts\self_test_ad_project_workflow.py

      - name: One-command ad workflow self-test
        run: python scripts\self_test_run_ad_workflow.py

      - name: Canvas tools self-test
        run: python scripts\self_test_canvas_tools.py

      - name: Canvas interaction self-test
        run: python scripts\self_test_canvas_interaction.py

      - name: Interactive canvas widget self-test
        run: python scripts\self_test_interactive_canvas_widget.py

      - name: Banana Level self-test
        run: python scripts\self_test_banana_level.py

      - name: Image Intelligence self-test
        run: python scripts\self_test_image_intelligence.py

      - name: Advanced preset self-test
        run: python scripts\self_test_presets.py

      - name: Workspace preset bridge self-test
        run: python scripts\self_test_workspace_preset_bridge.py

      - name: App wiring import self-test
        run: python scripts\self_test_app_wiring.py

      - name: Offscreen UI smoke test
        run: python scripts\self_test_ui_offscreen.py

      - name: Generate visual proof package
        run: python scripts\generate_visual_proof_package.py

      - name: Write failure report if needed
        if: failure()
        run: python scripts\write_failure_report.py

      - name: Write workflow summary
        if: always()
        run: python scripts\write_workflow_summary.py

      - name: Upload animated preview package
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ttg-reference-animated-preview
          path: |
            outputs\index.html
            outputs\FAILURE_REPORT.md
            outputs\VISUAL_PROOF_REVIEW.md
            outputs\ADVANCED_PRESET_REPORT.md
            outputs\ttg_reference_still.jpg
            outputs\ttg_reference_still_score.json
            outputs\reference_motion_preview.gif
            outputs\reference_motion_contact_sheet.jpg
            outputs\reference_motion_score.json
            outputs\ttg_visual_proof_manifest.json

      - name: Upload ad workflow proof
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ttg-ad-workflow-proof
          path: |
            outputs\ad_workflow\AD_WORKFLOW_PROOF.md
            outputs\ad_workflow\ttg_ad_from_folder.ttgstudio.json
            outputs\ad_workflow\ttg_ad_from_zip.ttgstudio.json
            outputs\ad_workflow\ttg_ad_contact_sheet.jpg
